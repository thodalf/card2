[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Baseline hardening headers. A Content-Security-Policy is deliberately not
# set here yet — this app relies on Firebase Auth (incl. Google Sign-In
# popups/redirects) and Realtime Database over a moving set of googleapis.com/
# firebaseio.com origins, plus React's widespread inline `style={{}}` usage.
# A CSP strict enough to matter needs to be built and tested against the real
# Firebase project (popups are notoriously CSP-sensitive) rather than guessed
# here — get it wrong and it silently breaks login instead of failing loudly.
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), usb=()"

# index.html isn't content-hashed (unlike the JS/CSS it references), and sw.js
# is what decides whether a client even learns a new version exists — letting
# either sit in a CDN/browser cache is how "vider le cache & recharger" (or
# the automatic update check in main.jsx) ends up checking a stale copy of
# the thing that's supposed to tell it a new deploy happened.
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache"
