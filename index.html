    <script>
      // Ensure crypto is available as a bare global before any module loads
      (function(){
        if(typeof globalThis.crypto==='undefined'){
          if(typeof window!=='undefined'&&window.crypto)
            try{Object.defineProperty(globalThis,'crypto',{get:function(){return window.crypto},configurable:true})}catch(e){}
        }
        if(typeof globalThis.crypto!=='undefined'&&!globalThis.crypto.randomUUID){
          globalThis.crypto.randomUUID=function(){
            var b=new Uint8Array(16);globalThis.crypto.getRandomValues(b);
            b[6]=(b[6]&0x0f)|0x40;b[8]=(b[8]&0x3f)|0x80;
            return Array.from(b).map(function(v,i){return([4,6,8,10].indexOf(i)>-1?'-':'')+v.toString(16).padStart(2,'0')}).join('');
          };
        }
      })();
    </script>
